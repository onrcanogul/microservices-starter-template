# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences from dev:
#   - No debug UIs (kafka-ui, Grafana, Jaeger UI ports)
#   - Passwords sourced from Docker secrets or env
#   - Resource limits on containers
#   - No host-port mapping for internal services
#   - Restart policy: always

version: "3.9"

services:
  postgres:
    container_name: prod-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-appdb}
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  redis:
    container_name: prod-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  kafka:
    container_name: prod-kafka
    restart: always
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_KRAFT_CLUSTER_ID=${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  kafka-ui:
    profiles: ["debug"]

  config-server:
    container_name: prod-config-server
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  api-gateway:
    container_name: prod-api-gateway
    restart: always
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - RATE_LIMIT_RPS=${RATE_LIMIT_RPS:-20}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-40}
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  example-service:
    container_name: prod-example-service
    restart: always
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-appdb}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BOOTSTRAP=kafka:9092
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"

  jaeger:
    profiles: ["debug"]

  prometheus:
    container_name: prod-prometheus
    restart: always
    ports: !reset []

  grafana:
    container_name: prod-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
