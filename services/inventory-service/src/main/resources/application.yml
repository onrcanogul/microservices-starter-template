spring:
  application:
    name: inventory-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inventorydb}
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:app}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
  eureka:
    client:
      service-url:
        defaultZone: http://discovery-service:8761/eureka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:19092}
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: latest
      properties:
        spring.json.trusted.packages: "*"
    producer:
      acks: all
      properties:
        enable.idempotence: true
        linger.ms: 5
        compression.type: zstd

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0

acme:
  messaging:
    kafka:
      max-attempts: 5
      backoff-ms: 200
      dlt-suffix: ".DLT"
      topic-prefix: ""
  security:
    jwt:
      secret: ${JWT_SECRET}
      # Read-only stock observation endpoint is public so it can be curled without a token.
      public-paths:
        - /api/stock/**

logging:
  pattern:
    level: "%5p [trace=%X{traceId:-} span=%X{spanId:-}]"

server:
  port: 8081
