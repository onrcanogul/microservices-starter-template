name: Config Server CI

on:
  push:
    paths:
      - 'infra/config-server/**'
  pull_request:
    paths:
      - 'infra/config-server/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build Config Server
        run: |
          mvn -B clean package -pl infra/config-server -am -DskipTests

