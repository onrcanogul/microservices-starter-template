spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        order_inserts: true
        order_updates: true
        jdbc.batch_size: 50
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      validation-timeout: 5000
      keepalive-time: 300000
      pool-name: ${spring.application.name:app}-pool

acme:
  persistence:
    open-in-view: false
    ddl-auto: none
    time-zone: UTC
    jdbc-batch-size: 50
    order-inserts: true
    order-updates: true
    jpa:
      auditing-enabled: true
    tx:
      default-timeout-seconds: 30
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout-ms: 30000
      idle-timeout-ms: 600000
      max-lifetime-ms: 1800000
      leak-detection-threshold-ms: 60000
      validation-timeout-ms: 5000
      keepalive-time-ms: 300000
